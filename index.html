<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caro Online</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <h1>Caro Online Xin Chào</h1>
        </header>

        <div id=\"screen-lobby\" class=\"screen active\">
            <div class=\"lobby-controls\">
                <div class=\"profile-group\" style=\"display: flex; align-items: center; justify-content: space-between; background: #22222a; padding: 8px 12px; margin-bottom: 8px; border-radius: 4px; border: 1px solid #2a2a35;\">
                    <div style=\"font-size: 13px; color: #aaa;\">Tên của bạn: <span id=\"display-my-username\" style=\"color: #00e5ff; font-weight: bold;\">...</span></div>
                    <button id=\"btn-change-username\" class=\"btn btn-secondary\" style=\"padding: 4px 10px; font-size: 11px; margin: 0;\">Đổi Tên</button>
                </div>

                <div class=\"input-group\">
                    <input type="password" id="input-room-pass" placeholder="Mật mã phòng (Để trống nếu mở)">
                </div>
                <div class="btn-group">
                    <button id="btn-create-room" class="btn btn-primary">Tạo Phòng</button>
                    <button id="btn-guide" class="btn btn-secondary">Hướng Dẫn</button>
                </div>
            </div>

            <div class="lobby-title">Danh Sách Phòng Đang Diễn Ra</div>
            <div id="room-list" class="room-list-grid">
                </div>
        </div>

        <div id="screen-game" class="screen">
            <div class="game-header-bar">
                <button id="btn-leave-room" class="btn btn-danger">Thoát</button>
                <div id="display-room-name" class="room-indicator">Phòng: --</div>
                <button id="btn-new-game" class="btn btn-success">Ván Mới</button>
            </div>

            <div class="players-status-container">
                <div id="player1-box" class="player-status-card">
                    <div class="role-badge white-badge">O</div>
                    <div id="p1-name" class="player-username">Đang chờ...</div>
                </div>
                <div class="vs-timer-center">
                    <div class="vs-text">VS</div>
                    <div id="game-timer" class="countdown-timer">60s</div>
                </div>
                <div id="player2-box" class="player-status-card">
                    <div class="role-badge black-badge">X</div>
                    <div id="p2-name" class="player-username">Đang chờ...</div>
                </div>
            </div>

            <div id="board-wrapper" class="board-wrapper">
                <div id="board-canvas" class="board-canvas">
                    </div>
            </div>

            <div class="game-footer-controls">
                <button id="btn-confirm-move" class="btn-action-confirm" disabled>XÁC NHẬN NƯỚC ĐI</button>
                
                <div id="chat-container" class="chat-system-box">
                    <div id="chat-messages" class="chat-logs-wrapper"></div>
                    <div class="emoji-row">
                        <span class="emoji-btn">😀</span>
                        <span class="emoji-btn">🤣</span>
                        <span class="emoji-btn">🔥</span>
                        <span class="emoji-btn">👍</span>
                        <span class="emoji-btn">🙏</span>
                        <span class="emoji-btn">😭</span>
                    </div>
                    <div class="chat-input-row">
                        <input type="text" id="input-chat-msg" placeholder="Nhập tin nhắn...">
                        <button id="btn-send-chat">Gửi</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="modal-overlay" class="modal-overlay">
            <div class="modal-content">
                <h3 id="modal-title">Hướng Dẫn</h3>
                <p id="modal-text"></p>
                <div id="modal-buttons" class="modal-buttons">
                    <button id="btn-modal-close" class="btn btn-primary">Đóng</button>
                </div>
            </div>
        </div>

        <footer class="app-footer">
            Thiết Kế Trần Cường - Zalo: 0907860662
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script src="huongdan.js"></script>
    <script src="bot.js"></script>
    <script src="app.js"></script>
</body>
</html>
