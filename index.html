<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caro Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- HEADER TOP -->
        <header class="app-header">
            <h1>Caro Online Xin Chào</h1>
        </header>

        <!-- MÀN HÌNH SẢNH CHỜ (LOBBY) -->
        <div id="screen-lobby" class="screen active">
            <div class="lobby-controls">
                <!-- KHU VỰC HIỂN THỊ VÀ ĐỔI TÊN NGƯỜI CHƠI -->
                <div class="profile-group" style="display: flex; align-items: center; justify-content: space-between; background: #22222a; padding: 8px 12px; margin-bottom: 8px; border-radius: 4px; border: 1px solid #2a2a35;">
                    <div style="font-size: 13px; color: #aaa;">Tên của bạn: <span id="display-my-username" style="color: #00e5ff; font-weight: bold;">...</span></div>
                    <button id="btn-change-username" class="btn btn-secondary" style="padding: 4px 10px; font-size: 11px; margin: 0;">Đổi Tên</button>
                </div>

                <div class="input-group">
                    <input type="password" id="input-room-pass" placeholder="Mật mã phòng (Để trống nếu mở)">
                </div>
                <div class="btn-group">
                    <button id="btn-create-room" class="btn btn-primary">Tạo Phòng</button>
                    <button id="btn-guide" class="btn btn-secondary">Hướng Dẫn</button>
                </div>
            </div>

            <div class="lobby-title">Danh Sách Phòng Đang Diễn Ra</div>
            <div id="room-list" class="room-list-grid">
                <!-- Danh sách phòng hiển thị ở đây -->
            </div>
        </div>

        <!-- MÀN HÌNH TRONG PHÒNG GAME -->
        <div id="screen-game" class="screen">
            <div class="game-header-bar" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <button id="btn-leave-room" class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px; margin: 0;">⬅ Sảnh</button>
                <div id="display-room-name" class="room-title-text" style="font-weight: bold; color: #00e5ff;">Phòng: --</div>
                <button id="btn-new-game" class="btn btn-primary" style="padding: 6px 12px; font-size: 12px; margin: 0;">Ván Mới</button>
            </div>

            <!-- THÔNG TIN HAI BÊN BÀN CỜ -->
            <div class="players-info">
                <div id="player1-box" class="player-card">
                    <div class="piece white" style="width: 15px; height: 15px; margin-right: 5px;"></div>
                    <div id="p1-name" class="p-name">Đang chờ...</div>
                </div>
                <div class="vs-timer-box" style="text-align: center;">
                    <div class="vs-text">VS</div>
                    <div id="game-timer" style="color: #ff1744; font-weight: bold; font-size: 13px;">60s</div>
                </div>
                <div id="player2-box" class="player-card" style="justify-content: flex-end;">
                    <div id="p2-name" class="p-name" style="text-align: right; margin-right: 5px;">Đang chờ...</div>
                    <div class="piece black" style="width: 15px; height: 15px;"></div>
                </div>
            </div>

            <!-- KHU VỰC BÀN CỜ CARO -->
            <div id="board-wrapper" class="board-wrapper">
                <div id="board-canvas" class="board-canvas"></div>
            </div>

            <!-- KHU VỰC ĐẶT QUÂN VÀ CHAT -->
            <div class="game-footer-controls" style="margin-top: 8px; display: flex; flex-direction: column; gap: 8px;">
                <button id="btn-confirm-move" class="btn btn-warning" style="width: 100%; padding: 10px; font-size: 14px; margin: 0;" disabled>ĐẶT QUÂN XÁC NHẬN</button>
                
                <div id="chat-container" class="chat-container">
                    <div id="chat-messages" class="chat-messages"></div>
                    <div class="emoji-row">
                        <span class="emoji-btn">😀</span>
                        <span class="emoji-btn">🤣</span>
                        <span class="emoji-btn">🔥</span>
                        <span class="emoji-btn">👍</span>
                        <span class="emoji-btn">🙏</span>
                        <span class="emoji-btn">😭</span>
                    </div>
                    <div class="chat-input-row">
                        <input type="text" id="input-chat-msg" placeholder="Nhập tin nhắn...">
                        <button id="btn-send-chat">Gửi</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- POPUP HƯỚNG DẪN / THÔNG BÁO -->
        <div id="modal-overlay" class="modal-overlay">
            <div class="modal-content">
                <h3 id="modal-title">Hướng Dẫn</h3>
                <p id="modal-text" style="white-space: pre-line; text-align: left; font-size: 12px; max-height: 200px; overflow-y: auto; margin-bottom: 15px; color: #ccc;"></p>
                <div id="modal-buttons" class="modal-buttons">
                    <button id="btn-modal-close" class="btn btn-primary" style="width: 100%;">Đóng</button>
                </div>
            </div>
        </div>

        <!-- FOOTER -->
        <footer class="app-footer">
            Thiết Kế Trần Cường - Zalo: 0907860662
        </footer>
    </div>

    <!-- Tích hợp SDK và các file logic -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="huongdan.js"></script>
    <script src="bot.js"></script>
    <script src="app.js"></script>
</body>
</html>
